# Put these locations inside the existing Studio server block.
# Replace studio.example.com and gateway.example.com with your own domains.
# Replace 127.0.0.1:8080 with your OpenAI-compatible gateway upstream if it runs elsewhere.
#
# If your main site has no Studio static files, add this in that server block
# as a safety redirect:
#
# location = /studio {
#     return 301 https://studio.example.com/studio/;
# }
#
# location /studio/ {
#     return 301 https://studio.example.com$request_uri;
# }

add_header X-Content-Type-Options nosniff always;
add_header Referrer-Policy same-origin always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https://studio.example.com https://gateway.example.com; base-uri 'self'; frame-ancestors 'self'" always;

location = /studio {
    return 301 /studio/;
}

location /studio/ {
    alias /var/www/ohlaoo-studio/;
    index studio.html;
    try_files $uri $uri/ /studio/studio.html;
}

location ~ ^/studio/(cases\.json|inspirations\.json|inspiration-sources\.json|style-library\.json)$ {
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    return 404;
}

location /studio/studio-assets/ {
    alias /var/www/ohlaoo-studio/studio-assets/;
    try_files $uri =404;
    access_log off;
    expires 30d;
}

location /studio/images/ {
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    return 404;
}

location /studio-api/ {
    proxy_pass http://127.0.0.1:8787/studio-api/;
    proxy_http_version 1.1;
    client_max_body_size 120m;
    proxy_buffering off;
    proxy_cache off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /v1/responses {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_connect_timeout 30s;
    chunked_transfer_encoding on;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

