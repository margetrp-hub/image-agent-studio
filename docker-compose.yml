services:
  studio-web:
    build:
      context: .
      target: web
      args:
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/studio/}
        STUDIO_BASE_PATH: ${STUDIO_BASE_PATH:-/studio/}
        VITE_AI_GATEWAY_BASE_URL: ${VITE_AI_GATEWAY_BASE_URL:-${VITE_SUB2API_BASE_URL:-}}
        VITE_AI_GATEWAY_MODEL_BASE_URL: ${VITE_AI_GATEWAY_MODEL_BASE_URL:-${VITE_SUB2API_GATEWAY_BASE_URL:-}}
        VITE_AI_IMAGE_ROUTE: ${VITE_AI_IMAGE_ROUTE:-${VITE_SUB2API_IMAGE_ROUTE:-auto}}
        VITE_AI_RESPONSES_MODEL: ${VITE_AI_RESPONSES_MODEL:-${VITE_SUB2API_RESPONSES_MODEL:-gpt-5.5}}
        VITE_AI_RESPONSES_PARTIAL_IMAGES: ${VITE_AI_RESPONSES_PARTIAL_IMAGES:-${VITE_SUB2API_RESPONSES_PARTIAL_IMAGES:-2}}
        VITE_AI_PROMPT_OPTIMIZER_MODEL: ${VITE_AI_PROMPT_OPTIMIZER_MODEL:-${VITE_SUB2API_PROMPT_OPTIMIZER_MODEL:-}}
        VITE_AI_GATEWAY_LOGIN_URL: ${VITE_AI_GATEWAY_LOGIN_URL:-${VITE_SUB2API_LOGIN_URL:-/login}}
        VITE_SUB2API_BASE_URL: ${VITE_SUB2API_BASE_URL:-}
        VITE_SUB2API_GATEWAY_BASE_URL: ${VITE_SUB2API_GATEWAY_BASE_URL:-}
        VITE_SUB2API_IMAGE_ROUTE: ${VITE_SUB2API_IMAGE_ROUTE:-auto}
        VITE_SUB2API_RESPONSES_MODEL: ${VITE_SUB2API_RESPONSES_MODEL:-gpt-5.5}
        VITE_SUB2API_RESPONSES_PARTIAL_IMAGES: ${VITE_SUB2API_RESPONSES_PARTIAL_IMAGES:-2}
        VITE_SUB2API_PROMPT_OPTIMIZER_MODEL: ${VITE_SUB2API_PROMPT_OPTIMIZER_MODEL:-}
        VITE_SUB2API_LOGIN_URL: ${VITE_SUB2API_LOGIN_URL:-/login}
        VITE_STUDIO_HISTORY_BASE_URL: ${VITE_STUDIO_HISTORY_BASE_URL:-}
        VITE_STUDIO_BACK_URL: ${VITE_STUDIO_BACK_URL:-/}
        VITE_STUDIO_LIBRARY_AUTH_REQUIRED: ${VITE_STUDIO_LIBRARY_AUTH_REQUIRED:-false}
    image: image-agent-studio-web:local
    environment:
      AI_GATEWAY_UPSTREAM: ${AI_GATEWAY_UPSTREAM:-${SUB2API_UPSTREAM:-http://host.docker.internal:8080}}
      SUB2API_UPSTREAM: ${SUB2API_UPSTREAM:-${AI_GATEWAY_UPSTREAM:-http://host.docker.internal:8080}}
      STUDIO_HISTORY_UPSTREAM: http://studio-history:8787
      STUDIO_NGINX_CLIENT_MAX_BODY_SIZE: ${STUDIO_NGINX_CLIENT_MAX_BODY_SIZE:-120m}
    ports:
      - "${STUDIO_PORT:-8080}:80"
    depends_on:
      studio-history:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/studio/ >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5

  studio-history:
    build:
      context: .
      target: history
    image: image-agent-studio-history:local
    environment:
      AI_GATEWAY_BASE_URL: ${AI_GATEWAY_UPSTREAM:-${SUB2API_UPSTREAM:-http://host.docker.internal:8080}}
      SUB2API_BASE_URL: ${SUB2API_UPSTREAM:-${AI_GATEWAY_UPSTREAM:-http://host.docker.internal:8080}}
      STUDIO_HISTORY_HOST: 0.0.0.0
      STUDIO_HISTORY_PORT: 8787
      STUDIO_VERSION: ${STUDIO_VERSION:-1.0.0}
      STUDIO_AUTH_MODE: ${STUDIO_AUTH_MODE:-local}
      STUDIO_DATA_DIR: /data
      STUDIO_LIBRARY_DIR: /app/library
      STUDIO_LIBRARY_ASSET_DIR: /app/library/images
      STUDIO_HISTORY_LIMIT: ${STUDIO_HISTORY_LIMIT:-200}
      STUDIO_SESSION_NODE_LIMIT: ${STUDIO_SESSION_NODE_LIMIT:-80}
      STUDIO_SESSION_URL_LIMIT: ${STUDIO_SESSION_URL_LIMIT:-24}
      STUDIO_SESSION_QUEUE_LIMIT: ${STUDIO_SESSION_QUEUE_LIMIT:-12}
      STUDIO_SESSION_MESSAGE_LIMIT: ${STUDIO_SESSION_MESSAGE_LIMIT:-24}
      STUDIO_JOB_LIMIT: ${STUDIO_JOB_LIMIT:-120}
      STUDIO_JOB_TIMEOUT_MS: ${STUDIO_JOB_TIMEOUT_MS:-2700000}
      STUDIO_GATEWAY_FETCH_TIMEOUT_MS: ${STUDIO_GATEWAY_FETCH_TIMEOUT_MS:-2640000}
      STUDIO_JOB_CONCURRENCY: ${STUDIO_JOB_CONCURRENCY:-1}
      STUDIO_MAX_BODY_BYTES: ${STUDIO_MAX_BODY_BYTES:-100663296}
      STUDIO_MAX_IMAGE_BYTES: ${STUDIO_MAX_IMAGE_BYTES:-33554432}
      STUDIO_ALLOWED_ORIGINS: ${STUDIO_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
    volumes:
      - studio-data:/data
      - ${STUDIO_LIBRARY_DIR:-./public}:/app/library:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8787/studio-api/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  studio-data:
